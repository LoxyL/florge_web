<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Florge - Anvil</title>
    <link rel="stylesheet" href="./css/anvil.css">
</head>
<body>
    <div class="anvil-shell">
        <aside class="anvil-sidebar">
            <a href="index.html" class="sidebar-title">Florge</a>

            <section class="sidebar-panel">
                <div class="sidebar-panel-header">
                    <span>Worlds</span>
                    <button id="create-world-btn" class="sidebar-action-button" title="Create world">+</button>
                </div>
                <div id="world-list" class="world-list"></div>
            </section>

            <section class="sidebar-panel sidebar-panel--compact">
                <div class="sidebar-panel-header">
                    <span>Views</span>
                </div>
                <a id="anvil-timeline-link" class="sidebar-nav-link is-disabled" href="anvil-timeline.html" aria-disabled="true">Timeline</a>
            </section>

            <section class="sidebar-panel">
                <div class="sidebar-panel-header">
                    <span>Sections</span>
                    <button id="create-entry-btn" class="sidebar-action-button" title="Create entry">+</button>
                </div>
                <div id="section-list" class="section-list"></div>
            </section>

            <section class="sidebar-panel">
                <div class="sidebar-panel-header">
                    <span>AI Controls</span>
                </div>

                <label for="anvil-text-model">Text Model</label>
                <select id="anvil-text-model" class="sidebar-select">
                    <optgroup label="OpenAI · GPT-5 (2026)">
                        <option value="gpt-5.4">GPT 5.4</option>
                        <option value="gpt-5.4-mini">GPT 5.4 Mini</option>
                        <option value="gpt-5.4-nano">GPT 5.4 Nano</option>
                    </optgroup>
                    <optgroup label="OpenAI · GPT-4 / o">
                        <option value="gpt-4.1">GPT 4.1</option>
                        <option value="gpt-4.1-mini">GPT 4.1 Mini</option>
                        <option value="gpt-4.1-nano">GPT 4.1 Nano</option>
                        <option value="gpt-4o">GPT 4o</option>
                        <option value="gpt-4o-mini" selected>GPT 4o Mini</option>
                        <option value="o3">O3</option>
                        <option value="o3-mini">O3 Mini</option>
                        <option value="o1">O1</option>
                        <option value="o1-mini">O1 Mini</option>
                    </optgroup>
                    <optgroup label="DeepSeek">
                        <option value="deepseek-ai/DeepSeek-V3">DeepSeek V3</option>
                        <option value="deepseek-ai/DeepSeek-R1">DeepSeek R1</option>
                    </optgroup>
                    <optgroup label="Claude">
                        <option value="claude-opus-4-20250514">Claude Opus 4</option>
                        <option value="claude-sonnet-4-20250514">Claude Sonnet 4</option>
                        <option value="claude-3-7-sonnet-20250219">Claude 3.7 Sonnet</option>
                        <option value="claude-3-5-sonnet-20241022">Claude 3.5 Sonnet</option>
                    </optgroup>
                    <optgroup label="Gemini">
                        <option value="gemini-3.1-pro-preview">Gemini 3.1 Pro</option>
                        <option value="gemini-3-flash-preview">Gemini 3 Flash</option>
                    </optgroup>
                    <optgroup label="Grok">
                        <option value="grok-3">Grok 3</option>
                        <option value="grok-3-mini">Grok 3 Mini</option>
                    </optgroup>
                </select>

                <label for="anvil-image-model">Image Model</label>
                <select id="anvil-image-model" class="sidebar-select">
                    <optgroup label="OpenAI">
                        <option value="gpt-image-1.5" selected>GPT Image 1.5</option>
                        <option value="dall-e-3">Dall-e 3</option>
                    </optgroup>
                    <optgroup label="Google Gemini">
                        <option value="gemini-3-pro-image-preview">Nano Banana Pro</option>
                        <option value="gemini-3.1-flash-image-preview">Nano Banana 2</option>
                        <option value="gemini-2.5-flash-image-preview">Nano Banana</option>
                    </optgroup>
                </select>

                <label for="anvil-image-ratio">Image Ratio</label>
                <select id="anvil-image-ratio" class="sidebar-select">
                    <option value="1:1">1:1 Square</option>
                    <option value="16:9">16:9 Widescreen</option>
                    <option value="9:16">9:16 Portrait</option>
                    <option value="4:3">4:3 Standard</option>
                    <option value="3:4">3:4 Vertical</option>
                </select>

                <label for="anvil-image-quality">Image Quality</label>
                <select id="anvil-image-quality" class="sidebar-select">
                    <option value="1024">1K</option>
                    <option value="2048">2K</option>
                    <option value="4096">4K</option>
                </select>
            </section>
        </aside>

        <main class="anvil-main">
            <section id="world-hero" class="world-hero"></section>

            <div class="anvil-workspace">
                <section class="entry-studio entry-studio-main">
                    <div class="entry-studio-panel entry-studio-panel-main">
                        <div class="studio-header">
                            <span class="eyebrow">Entry Studio</span>
                            <h2 id="studio-title">Select an entry</h2>
                        </div>

                        <div id="entry-studio-content" class="entry-studio-content"></div>
                    </div>
                </section>

                <section id="brainstorm-panel" class="brainstorm-panel"></section>

                <aside class="section-board section-board-drawer">
                    <div id="section-board-peek" class="section-board-peek" aria-hidden="true"></div>

                    <div class="section-board-panel">
                        <div class="board-toolbar">
                            <div class="board-heading">
                                <span class="eyebrow">Section Board</span>
                                <h2 id="board-title">Anvil</h2>
                            </div>

                            <div class="board-controls">
                                <input id="entry-search-input" type="search" placeholder="Search entries...">
                                <select id="entry-status-filter">
                                    <option value="all">All Status</option>
                                    <option value="Seed">Seed</option>
                                    <option value="Draft">Draft</option>
                                    <option value="Review">Review</option>
                                    <option value="Locked">Locked</option>
                                </select>
                                <button id="entry-board-create-btn" class="button-primary" type="button">New Entry</button>
                            </div>
                        </div>

                        <div id="entry-board" class="entry-board"></div>
                    </div>
                </aside>
            </div>
        </main>
    </div>

    <div id="lightbox" class="lightbox">
        <div class="lightbox-backdrop" data-close-lightbox="true"></div>
        <div class="lightbox-content-wrapper">
            <button id="lightbox-close" class="lightbox-close" title="Close">&times;</button>
            <img id="lightbox-img" src="" alt="Enlarged Anvil asset">
            <div id="lightbox-caption" class="lightbox-caption"></div>
        </div>
    </div>

    <div class="config-container" id="config-container">
        <svg viewBox="0 0 24 24" width="24" height="24">
            <path d="M19.14,12.94c0.04-0.3,0.06-0.61,0.06-0.94c0-0.32-0.02-0.64-0.06-0.94l2.03-1.58c0.18-0.14,0.23-0.41,0.12-0.61 l-1.92-3.32c-0.12-0.22-0.37-0.29-0.59-0.22l-2.39,0.96c-0.5-0.38-1.03-0.7-1.62-0.94L14.4,2.81c-0.04-0.24-0.24-0.41-0.48-0.41 h-3.84c-0.24,0-0.43,0.17-0.47,0.41L9.25,5.35C8.66,5.59,8.12,5.92,7.63,6.29L5.24,5.33c-0.22-0.08-0.47,0-0.59,0.22L2.73,8.87 C2.62,9.08,2.66,9.34,2.86,9.48l2.03,1.58C4.84,11.36,4.8,11.69,4.8,12s0.02,0.64,0.06,0.94l-2.03,1.58 c-0.18,0.14-0.23,0.41-0.12,0.61l1.92,3.32c0.12,0.22,0.37,0.29,0.59,0.22l2.39-0.96c0.5,0.38,1.03,0.7,1.62,0.94l0.36,2.54 c0.05,0.24,0.24,0.41,0.48,0.41h3.84c0.24,0,0.43-0.17,0.47-0.41l0.36-2.54c0.59-0.24,1.13-0.56,1.62-0.94l2.39,0.96 c0.22,0.08,0.47,0,0.59-0.22l1.92-3.32c0.12-0.22,0.07-0.49-0.12-0.61L19.14,12.94z M12,15.6c-1.98,0-3.6-1.62-3.6-3.6 s1.62-3.6,3.6-3.6s3.6,1.62,3.6,3.6S13.98,15.6,12,15.6z"/>
        </svg>
        <div class="config-container-content">
            <div class="config-tabs">
                <button class="config-tab-button active" onclick="configOpenTab(event, 'config-tab-content-text')">Text</button>
                <button class="config-tab-button" onclick="configOpenTab(event, 'config-tab-content-image')">Image</button>
            </div>
            <div class="config-tab-contents">
                <div id="config-tab-content-text" class="config-tab-content" style="display: flex;">
                    <div class="config-tab-content-part">
                        <label for="config-source-GPT">GPT Endpoint</label>
                        <input name="config-source-GPT" type="text" id="config-source-GPT" placeholder="https://api.openai-hk.com/v1/chat/completions">

                        <label for="config-apikey-GPT">GPT API Key</label>
                        <input name="config-apikey-GPT" type="password" id="config-apikey-GPT" placeholder="sk-...">

                        <label for="config-source-deepseek">Deepseek Endpoint</label>
                        <input name="config-source-deepseek" type="text" id="config-source-deepseek" placeholder="https://api.siliconflow.cn/v1/chat/completions">

                        <label for="config-apikey-deepseek">Deepseek API Key</label>
                        <input name="config-apikey-deepseek" type="password" id="config-apikey-deepseek" placeholder="sk-...">
                    </div>
                </div>
                <div id="config-tab-content-image" class="config-tab-content" style="display: none;">
                    <div class="config-tab-content-part">
                        <label for="config-source-painter">Image Endpoint</label>
                        <input name="config-source-painter" type="text" id="config-source-painter" placeholder="https://api.openai-hk.com">

                        <label for="config-apikey-painter">Image API Key</label>
                        <input name="config-apikey-painter" type="password" id="config-apikey-painter" placeholder="sk-...">
                    </div>
                </div>
            </div>
            <div class="config-buttons">
                <button class="config-button" id="l" onclick="configLoad()">Load</button>
                <button class="config-button" id="s" onclick="configSave()">Save</button>
            </div>
        </div>
    </div>

    <script type="module" src="js/configEvent.js"></script>
    <script type="module" src="js/anvil.js"></script>
</body>
</html>
